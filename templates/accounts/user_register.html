<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b);
            padding:20px;
        }

        .container{
            width:420px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        .title{
            text-align:center;
            margin-bottom:30px;
        }

        .title h1{
            color:#0f172a;
            margin-bottom:10px;
        }

        .input-box{
            margin-bottom:18px;
        }

        .input-box input{
            width:100%;
            padding:14px;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:15px;
            outline:none;
            transition:0.3s;
        }

        .input-box input:focus{
            border-color:#2563eb;
        }

        .btn{
            width:100%;
            padding:14px;
            border:none;
            background:#2563eb;
            color:white;
            font-size:16px;
            border-radius:10px;
            cursor:pointer;
            transition:0.3s;
            margin-top:10px;
        }

        .btn:hover{
            background:#1d4ed8;
        }

        .bottom-text{
            text-align:center;
            margin-top:20px;
        }

        .bottom-text a{
            text-decoration:none;
            color:#2563eb;
            font-weight:bold;
        }

    </style>

</head>
<body>

    <div class="container">

        <div class="title">
            <h1>Create User Account</h1>
            <p>Register to continue</p>
        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="input-box">
                <input type="text" name="name" placeholder="Full Name" required>
            </div>

            <div class="input-box">
                <input type="text" name="phone" placeholder="Phone Number" required>
            </div>

            <div class="input-box">
                <input type="email" name="email" placeholder="Email Address" required>
            </div>

            <div class="input-box">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <div class="input-box">
                <input type="text" name="vehicle" placeholder="Vehicle Number" required>
            </div>

            <button type="submit" class="btn">
                Create Account
            </button>

        </form>

        <div class="bottom-text">
            Already have an account?
            <a href="/">Login</a>
        </div>

    </div>

</body>
</html>
