<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lock-N-Go · User Registration</title>

    {% load static %}

    <link rel="stylesheet" href="{% static 'css/lockngo.css' %}">
    <link rel="stylesheet" href="{% static 'css/register.css' %}">

</head>
<body>

    <div class="container">

        <div class="reg-brand">
            <span class="badge"></span>
            <b>Lock<span>-N-Go</span></b>
        </div>

        <div class="title">
            <h1>Create your account</h1>
            <p>Join Lock-N-Go and book parking in seconds</p>
        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="input-box">
                <input type="text" name="name" placeholder="Full Name" required>
            </div>

            <div class="input-box">
                <input type="text" name="phone" placeholder="Phone Number" required>
            </div>

            <div class="input-box">
                <input type="email" name="email" placeholder="Email Address" required>
            </div>

            <div class="input-box">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <div class="input-box">
                <input type="text" name="vehicle" placeholder="Vehicle Number" required>
            </div>

            <button type="submit" class="btn">
                Create Account
            </button>

        </form>

        <div class="bottom-text">
            Already have an account?
            <a href="/login/">Login</a>
        </div>

    </div>

</body>
</html>
