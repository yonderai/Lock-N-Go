<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lock-N-Go · Owner Registration</title>

    {% load static %}

    <link rel="stylesheet" href="{% static 'css/lockngo.css' %}">
    <link rel="stylesheet" href="{% static 'css/register.css' %}">

</head>
<body>

    <div class="container wide">

        <div class="reg-brand">
            <span class="badge"></span>
            <b>Lock<span>-N-Go</span></b>
        </div>

        <div class="title">
            <h1>List your parking</h1>
            <p>Register your parking business and start earning</p>
        </div>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <div class="section-title">
                Owner Details
            </div>

            <div class="input-box">
                <input type="text" name="name" placeholder="Full Name" required>
            </div>

            <div class="input-box">
                <input type="text" name="phone" placeholder="Phone Number" required>
            </div>

            <div class="input-box">
                <input type="email" name="email" placeholder="Email Address" required>
            </div>

            <div class="input-box">
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="input-box">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <div class="section-title">
                Parking Details
            </div>

            <div class="input-box">
                <input type="text" name="parking_name" placeholder="Parking Name" required>
            </div>

            <div class="input-box">
                <label class="file-label">
                    Upload Parking Photos
                </label>

                <input type="file" name="parking_images" multiple>
            </div>

            <div class="input-box">
                <label class="file-label">
                    Upload Parking Documents
                </label>

                <input type="file" name="parking_docs" multiple>
            </div>

            <div class="input-box">
                <label class="file-label">
                    Upload GOVT ID Photo
                </label>

                <input type="file" name="govt_id" multiple>
            </div>

            <div class="input-box">
                <input type="url" name="google_map" placeholder="Google Map Link" required>
            </div>

            <div class="input-box">
                <textarea name="address" placeholder="Parking Address" required></textarea>
            </div>

            <div class="input-box">
                <input type="number" name="number_of_car_slots" placeholder="Number of Car Slots" required>
            </div>

            <div class="input-box">
                <input type="number" name="price_per_hour for cars" placeholder="Price Per Hour for Cars" required>
            </div>

            <div class="input-box">
                <input type="number" name="number_of_bike_slots" placeholder="Number of Bike Slots" required>
            </div>

            <div class="input-box">
                <input type="number" name="price_per_hour for bikes" placeholder="Price Per Hour for Bikes" required>
            </div>

            <button type="submit" class="btn">
                Register Parking
            </button>

        </form>

        <div class="bottom-text">
            Already have an account?
            <a href="/">Login</a>
        </div>

    </div>

</body>
</html>
